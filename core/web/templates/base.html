<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#043f5f" />
  <title>MitoClipper v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDfltQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="masthead">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="brand" href="{{ url_for('index') }}">MitoClipper</a>
    <nav class="nav-links">
      <a class="nav-link" href="{{ url_for('index') }}">Dashboard</a>
      <a class="nav-link" href="{{ url_for('status') }}">Pipeline</a>
      <a class="nav-link" href="{{ url_for('browse_clips') }}">Clips</a>
      <a class="nav-link" href="{{ url_for('reset_state') }}">Reset</a>
    </nav>
  </div>
</header>
<main class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }} my-3" role="alert">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<footer class="footer px-4 py-3 text-center">
  <small>FirstByteBR style UI rebuild • MitoClipper 2026</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2m/IGfv/r1MROm/tLUFQ5h8m2QygZWpRLxNB5Nx5Tzl6hz0L2ELY1d6bc7j" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
