<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MitoClipper Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .log-terminal { font-family: 'JetBrains Mono', monospace; scrollbar-width: thin; scrollbar-color: #475569 #1e293b; }
        .log-terminal::-webkit-scrollbar { width: 6px; }
        .log-terminal::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold gradient-text">MitoClipper Evolution</h1>
                <p class="text-slate-400 mt-2">Professional Short-Form Video Suite</p>
            </div>
            <div id="status-badge" class="px-4 py-2 rounded-full glass flex items-center gap-2 text-sm">
                <span class="w-2 h-2 rounded-full bg-slate-500 animate-pulse"></span>
                <span>System Idle</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Controls -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <i data-lucide="zap" class="text-blue-400"></i> New Project
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">YouTube or Local URL</label>
                            <input type="text" id="url-input" placeholder="https://youtube.com/..." 
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-slate-400 mb-1">Top K Clips</label>
                                <input type="number" id="top-k" value="3" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm text-slate-400 mb-1">Max Secs</label>
                                <input type="number" id="max-dur" value="60" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">Subtitle Style</label>
                            <select id="subtitle-style" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 outline-none">
                                <option value="hormozi">Hormozi (High Energy)</option>
                                <option value="mrbeast">MrBeast (Dynamic)</option>
                                <option value="minimalist">Minimalist</option>
                            </select>
                        </div>
                        <button id="run-btn" onclick="runPipeline()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95 mt-4 flex items-center justify-center gap-2">
                            <i data-lucide="play-circle"></i> Create Clips
                        </button>
                    </div>
                </div>

                <!-- Metrics / Stats -->
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Pipeline Metrics</h3>
                    <div id="metrics-content" class="space-y-3">
                        <div class="flex justify-between text-sm"><span class="text-slate-500">Last Run</span> <span id="last-run">-</span></div>
                        <div class="flex justify-between text-sm"><span class="text-slate-500">Avg Speed</span> <span id="avg-speed">-</span></div>
                    </div>
                </div>
            </div>

            <!-- Middle/Right Column: Live Feedback & Clips -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Terminal -->
                <div class="glass rounded-2xl overflow-hidden shadow-2xl flex flex-col h-[400px]">
                    <div class="bg-slate-800/50 px-4 py-2 flex items-center justify-between border-b border-white/5">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500"></div>
                            <span class="text-xs text-slate-400 ml-2 font-mono">pipeline@mitoclipper:~</span>
                        </div>
                        <button onclick="clearLogs()" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Clear</button>
                    </div>
                    <div id="log-terminal" class="log-terminal flex-1 p-4 text-sm text-slate-300 overflow-y-auto space-y-1">
                        <div class="text-slate-500"># System initialized. Waiting for input...</div>
                    </div>
                </div>

                <!-- Clip Gallery -->
                <div id="clip-gallery-section" class="space-y-4">
                    <h2 class="text-2xl font-bold flex items-center gap-2">
                        <i data-lucide="film" class="text-purple-400"></i> Generated Highlights
                    </h2>
                    <div id="clip-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Clips will be injected here -->
                    </div>
                    <div id="no-clips" class="text-center py-12 glass rounded-2xl text-slate-500 italic">
                        No clips generated yet. Start a pipeline to see results.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        let ws;
        const terminal = document.getElementById('log-terminal');

        function setupWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws/logs`);
            ws.onmessage = (event) => {
                const div = document.createElement('div');
                div.textContent = event.data;
                if (event.data.includes('ERROR')) div.classList.add('text-red-400');
                if (event.data.includes('successfully')) div.classList.add('text-green-400');
                terminal.appendChild(div);
                terminal.scrollTop = terminal.scrollHeight;
            };
            ws.onclose = () => setTimeout(setupWebSocket, 2000);
        }

        async function runPipeline() {
            const url = document.getElementById('url-input').value;
            if (!url) return alert('Please enter a URL');

            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin">🌀</span> Processing...';

            try {
                const response = await fetch('/api/pipeline/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        top_k: parseInt(document.getElementById('top-k').value),
                        max_duration: parseInt(document.getElementById('max-dur').value),
                        subtitle_style: document.getElementById('subtitle-style').value
                    })
                });
                
                if (response.ok) {
                    pollStatus();
                } else {
                    const err = await response.json();
                    alert(err.detail);
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function pollStatus() {
            const res = await fetch('/api/pipeline/status');
            const data = await res.json();
            
            const badge = document.getElementById('status-badge');
            const runBtn = document.getElementById('run-btn');

            if (data.status === 'running' || data.status === 'starting') {
                badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></span> Running';
                setTimeout(pollStatus, 2000);
            } else if (data.status === 'done') {
                badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500"></span> Completed';
                runBtn.disabled = false;
                runBtn.innerHTML = '<i data-lucide="play-circle"></i> Create Clips';
                loadClips();
                lucide.createIcons();
            } else if (data.status === 'failed') {
                badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> Failed';
                runBtn.disabled = false;
                runBtn.innerHTML = '<i data-lucide="play-circle"></i> Create Clips';
                lucide.createIcons();
            }
        }

        async function loadClips() {
            const res = await fetch('/api/clips');
            const clips = await res.json();
            const grid = document.getElementById('clip-grid');
            const noClips = document.getElementById('no-clips');

            if (clips.length > 0) {
                noClips.style.display = 'none';
                grid.innerHTML = clips.map(c => `
                    <div class="glass p-4 rounded-xl space-y-3 hover:scale-[1.02] transition-transform">
                        <div class="aspect-video bg-black rounded-lg flex items-center justify-center relative overflow-hidden">
                             <video src="/api/clips/${c.filename}/stream" class="w-full h-full object-cover" controls></video>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-mono text-slate-400">${c.filename}</span>
                            <div class="flex gap-2">
                                <a href="/api/clips/${c.filename}/download" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                                    <i data-lucide="download" class="w-4 h-4"></i>
                                </a>
                                <button onclick="uploadToYoutube('${c.filename}')" class="p-2 hover:bg-blue-500/20 text-blue-400 rounded-lg transition-colors">
                                    <i data-lucide="share" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        function clearLogs() {
            terminal.innerHTML = '<div class="text-slate-500"># Logs cleared.</div>';
        }

        // Initial setup
        setupWebSocket();
        loadClips();
        pollStatus();
    </script>
</body>
</html>
